<div style="display: flex; justify-content: center; margin: 40px 0">
  <mat-card class="card">
    <mat-card-header class="card-header">

      <mat-card-title class="card-header-title">
        Insurance List
      </mat-card-title>

      <button
        mat-flat-button
        (click)="navigateToInsuranceCreatePage()"
        style="margin-left: auto"
      >
        <mat-icon fontIcon="add">add</mat-icon>
        Add Insurance
      </button>

    </mat-card-header>

    <mat-card-content class="card-body">
      <div class="table-wrapper">

        <ng-container *ngIf="insurances.length > 0; else noInsurances">

          <table mat-table [dataSource]="insurances" class="mat-elevation-z8 table">

            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>
                Insurance Name
              </th>
              <td mat-cell *matCellDef="let insurance">
                {{ insurance.name }}
              </td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef></th>

              <td mat-cell *matCellDef="let insurance">

                <div style="display: flex; align-items: center; justify-content: space-evenly;">

                  <mat-icon
                    class="pointer"
                    style="margin-right: 10px"
                    fontIcon="edit"
                    (click)="onEditInsurance(insurance)">
                    edit
                  </mat-icon>

                  <mat-icon
                    class="pointer"
                    fontIcon="delete"
                    *ngIf="userService.isAdmin() || userService.IsManager()"
                    (click)="onDeleteInsurance(insurance)">
                    delete
                  </mat-icon>

                </div>

              </td>

            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

          </table>

        </ng-container>

        <ng-template #noInsurances>
          <app-empty-list></app-empty-list>
        </ng-template>

      </div>
    </mat-card-content>
  </mat-card>
</div>
