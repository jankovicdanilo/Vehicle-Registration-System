<div style="display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 40px 0">
  <mat-card class="card">
    <mat-card-header class="card-header">
      <div style="display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 16px; flex-wrap: wrap;">
        <mat-card-title class="card-header-title" style="margin: 0; flex: 0 0 auto;">
          Vehicle List
        </mat-card-title>

        <div style="display: flex; align-items: center; gap: 12px;">
          <app-search
            [placeholder]="'Enter license plate, brand, model...'"
            [label]="'Search vehicles'"
            (searchChange)="onSearchChange($event)">
          </app-search>

          <button
            mat-flat-button
            color="primary"
            (click)="navigateToVehicleCreatePage()"
            style="height: 56px; white-space: nowrap;">
            <mat-icon>add</mat-icon>
            Add Vehicle
          </button>
        </div>
      </div>
    </mat-card-header>

    <mat-card-content class="card-body">
      <div class="table-wrapper">

        <ng-container *ngIf="vehicles.length > 0; else noVehicles">

          <table mat-table [dataSource]="vehicles" class="mat-elevation-z8 table">

            <ng-container matColumnDef="vehicleType">
              <th mat-header-cell *matHeaderCellDef>Type</th>
              <td mat-cell *matCellDef="let vehicle">
                {{ vehicle.vehicleTypeName }}
              </td>
            </ng-container>

            <ng-container matColumnDef="vehicleBrand">
              <th mat-header-cell *matHeaderCellDef>Brand</th>
              <td mat-cell *matCellDef="let vehicle">
                {{ vehicle.vehicleBrandName }}
              </td>
            </ng-container>

            <ng-container matColumnDef="vehicleModel">
              <th mat-header-cell *matHeaderCellDef>Model</th>
              <td mat-cell *matCellDef="let vehicle">
                {{ vehicle.vehicleModelName }}
              </td>
            </ng-container>

            <ng-container matColumnDef="productionYear">
              <th mat-header-cell *matHeaderCellDef>Year</th>
              <td mat-cell *matCellDef="let vehicle">
                {{ vehicle.productionYear }}
              </td>
            </ng-container>

            <ng-container matColumnDef="fuelType">
              <th mat-header-cell *matHeaderCellDef>Fuel</th>
              <td mat-cell *matCellDef="let vehicle">
                {{ vehicle.fuelType }}
              </td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef></th>

              <td mat-cell *matCellDef="let vehicle">
                <div style="display: flex; align-items: center; justify-content: space-between;">

                  <mat-icon
                    class="pointer"
                    style="margin-right: 10px"
                    fontIcon="edit"
                    (click)="onEditVehicle(vehicle)">
                    edit
                  </mat-icon>

                  <mat-icon
                    class="pointer"
                    fontIcon="delete"
                    *ngIf="userService.isAdmin() || userService.IsManager()"
                    (click)="onDeleteVehicle(vehicle)">
                    delete
                  </mat-icon>

                </div>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

          </table>

        </ng-container>

        <ng-template #noVehicles>
          <app-empty-list></app-empty-list>
        </ng-template>

      </div>
    </mat-card-content>
  </mat-card>

  <app-pagination
    [totalItems]="totalItems"
    [pageSize]="currentPageSize"
    (paginationChange)="onPaginationChange($event)">
  </app-pagination>

</div>
